{% extends "base.html" %}

{% block title %}
Edit
{% endblock %}

{% block main %}
<main class="d-flex flex-column align-items-center ">
    <h3 class="text-light mx-5 px-5">Habit</h3>
    <form class="m-5 justify-content-center" action="/edit/{{ habit.id }}" method="post">
        <!-- Habit Name -->
        <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Name" id="name" name="name" value="{{ habit.name }}" autofocus required>
        </div>
        <!-- Frequency -->
        <p class="text-light m-1 p-1">Frequency</p>
        {% for day in days %}
            <input type="checkbox" class="btn-check" id="{{ day }}" name="frequency" autocomplete="off" value="{{ day }}" {{ habit.frequency[day] }}>
            <label class="btn btn-outline-light m-1" for="{{ day }}">{{ days[day] }}</label>
        {% endfor %}
        <!-- New: Time Dropdown -->
        <p class="text-light m-1 p-1">Time</p>
        <div class="input-group mb-3">
            <select class="form-select" id="time_of_day" name="time_of_day" required>
                {% for time in time_options %}
                    <option value="{{ time }}" {% if time == habit.time_of_day %}selected{% endif %}>
                        {{ time }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <!-- Notes -->
        <p class="text-light m-1 p-1">Notes</p>
        <div class="text-light mx-3 mb-3">
            {{ habit.notes or "No notes added yet." }}
        </div>

        <div class="input-group mb-3">
            <input type="text" class="form-control" name="notes" id="notes" placeholder="New note..." rows="3">
        </div>
        <!-- Save Button -->
        <div class="d-flex justify-content-center w-100 my-4">
            <button type="submit" class="btn btn-outline-warning w-25 btn-lg">Save</button>
        </div>

    </form>
</main>
{% endblock %}
